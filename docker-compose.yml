services:

  app:
    build:
      context: .
      dockerfile: compose/app/Dockerfile
    container_name: messaging_gateway_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:80"
    command: /start_app.sh

  worker:
    build:
      context: .
      dockerfile: compose/worker/Dockerfile
    container_name: messaging_gateway_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: /start_app.sh

  postgres:
    image: pgvector/pgvector:pg16
    container_name: messaging_gateway_db
    restart: unless-stopped
    env_file: .env
    healthcheck:
      # test: /usr/bin/pg_isready
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 120
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: messaging_gateway_redis
    restart: unless-stopped
    volumes:
      - ${REDIS_DATA}:/data
    command: redis-server --appendonly yes
